# coturn configuration for Orbit Remote (STUN + TURN)
#
# Replace EXTERNAL_IP / REALM below, or override them via docker-compose command
# args. The TURN user must match TURN_USERNAME / TURN_PASSWORD given to the
# signaling server so it can hand matching credentials to clients.

# Listening ports
listening-port=3478
tls-listening-port=5349

# Public IP of the VPS. REQUIRED for relaying to work behind NAT.
# Example: external-ip=203.0.113.10
external-ip=EXTERNAL_IP

# Relay port range — must be opened in the firewall (UDP).
min-port=49160
max-port=49200

# Authentication: long-term credential mechanism.
# Set the same user/password in the signaling server env (TURN_USERNAME/PASSWORD).
lt-cred-mech
user=orbit:CHANGE_ME_STRONG_PASSWORD
realm=REALM

# Reasonable production hardening.
fingerprint
no-cli
no-tlsv1
no-tlsv1_1
stale-nonce=600
# Block relaying to private/loopback ranges (anti-abuse).
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# Logging
log-file=stdout
verbose
